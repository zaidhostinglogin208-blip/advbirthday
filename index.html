<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advance Happy Birthday 💖</title>

<style>
body{
  margin:0;
  font-family: 'Segoe UI';
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  text-align:center;
  color:white;
}

/* MAIN BOX */
.container{
  margin-top:80px;
}

/* TITLE */
h1{
  font-size:40px;
  text-shadow:2px 2px 10px black;
}

/* HEART */
.heart{
  font-size:50px;
  animation: beat 1s infinite;
}

@keyframes beat{
  0%{transform:scale(1);}
  50%{transform:scale(1.2);}
  100%{transform:scale(1);}
}

/* MESSAGE */
.message{
  font-size:20px;
  margin:20px;
}

/* COUNTDOWN */
.countdown{
  font-size:25px;
  margin:15px;
  font-weight:bold;
}

/* BUTTON */
button{
  padding:12px 25px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#ff4d6d;
  color:white;
  cursor:pointer;
}

/* SURPRISE BOX */
.surprise{
  display:none;
  margin-top:20px;
  font-size:22px;
  color:#000;
  background:white;
  padding:20px;
  border-radius:15px;
  width:70%;
  margin-left:auto;
  margin-right:auto;
}
</style>

</head>

<body>

<div class="container">
  <h1>💖 Advance Happy Birthday Simran 💖</h1>
  <div class="heart">❤️</div>

  <div class="message">
    I know your special day is coming soon...  
    but I just couldn't wait to say this 💌
  </div>

  <!-- COUNTDOWN -->
  <div class="countdown" id="countdown"></div>

  <button onclick="show()">Click for Surprise 🎁</button>

  <div class="surprise" id="surprise">
    💖 always be happy with your partner 💖 <br><br>
    and always remember to smile 😊 <br><br>
    and always be carefully taken care of 🎂✨
  </div>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mp3">
</audio>

<script>
function show(){
  document.getElementById("surprise").style.display="block";
  document.getElementById("music").play();
}

/* COUNTDOWN SCRIPT */
let targetDate = new Date("April 21, 2026 00:00:00").getTime();

let x = setInterval(function(){
  let now = new Date().getTime();
  let distance = targetDate - now;

  let days = Math.floor(distance / (1000*60*60*24));
  let hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
  let minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
  let seconds = Math.floor((distance % (1000*60)) / 1000);

  document.getElementById("countdown").innerHTML =
    "⏳ " + days + "d " + hours + "h " + minutes + "m " + seconds + "s left";

  if(distance < 0){
    clearInterval(x);
    document.getElementById("countdown").innerHTML = "🎂 It's Her Birthday Today 💖";
  }
},1000);
</script>

</body>
</html>
